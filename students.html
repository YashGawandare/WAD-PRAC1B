<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registered Students</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background-color: #f8f9fa; }
    #sidebar {
      min-width: 250px; max-width: 250px;
      min-height: 100vh; background: #2c3e50;
      color: #fff; transition: all 0.3s;
    }
    #sidebar .nav-link { color: rgba(255,255,255,0.7); padding: 15px 20px; }
    #sidebar .nav-link:hover, #sidebar .nav-link.active {
      color: #fff; background: rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
<div class="d-flex">
  <nav id="sidebar" class="d-none d-md-block">
    <div class="p-4">
      <h4 class="text-white mb-4"><i class="bi bi-mortarboard-fill me-2"></i>EduDash</h4>
      <ul class="nav flex-column">
        <li class="nav-item"><a href="app.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
        <li class="nav-item"><a href="students.html" class="nav-link active"><i class="bi bi-people me-2"></i> Students</a></li>
        <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-person-badge me-2"></i> Faculty</a></li>
        <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-book me-2"></i> Courses</a></li>
        <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-calendar-event me-2"></i> Events</a></li>
        <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-gear me-2"></i> Settings</a></li>
      </ul>
    </div>
  </nav>

  <div class="flex-grow-1">
    <nav class="navbar navbar-light bg-white border-bottom p-3">
      <div class="container-fluid">
        <span class="navbar-brand d-md-none">EduDash</span>
        <a href="register.html" class="btn btn-primary">
          <i class="bi bi-plus-lg me-1"></i> Add Student
        </a>
        <div class="ms-auto d-flex align-items-center">
          <div class="dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
              <img src="https://ui-avatars.com/api/?name=Admin" width="35" height="35" class="rounded-circle me-2">
              Admin
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="#">Profile</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <div class="container-fluid p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0">Registered Students</h3>
        <span class="badge bg-primary fs-6" id="studentCount">0 Students</span>
      </div>

      <!-- Search Bar -->
      <div class="mb-3">
        <input type="text" id="searchInput" class="form-control" placeholder="Search by name or course...">
      </div>

      <div class="card border-0 shadow-sm p-4">
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Student Name</th>
                <th>Course</th>
                <th>Registration Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="studentTable">
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-5 d-none">
          <i class="bi bi-person-x fs-1 text-muted"></i>
          <p class="text-muted mt-2">No students registered yet. <a href="register.html">Add one now</a>.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let students = JSON.parse(localStorage.getItem("students")) || [];

  function renderTable(data) {
    const tbody = document.getElementById("studentTable");
    const empty = document.getElementById("emptyState");
    const countBadge = document.getElementById("studentCount");

    tbody.innerHTML = "";
    countBadge.textContent = data.length + " Student" + (data.length !== 1 ? "s" : "");

    if (data.length === 0) {
      empty.classList.remove("d-none");
      return;
    }
    empty.classList.add("d-none");

    data.forEach((s, i) => {
      tbody.innerHTML += `
        <tr>
          <td>${i + 1}</td>
          <td><i class="bi bi-person-circle me-2 text-primary"></i>${s.name}</td>
          <td><span class="badge bg-info text-dark">${s.course}</span></td>
          <td>${s.date}</td>
          <td>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteStudent(${i})">
              <i class="bi bi-trash"></i> Delete
            </button>
          </td>
        </tr>`;
    });
  }

  function deleteStudent(index) {
    if (confirm("Are you sure you want to delete this student?")) {
      students.splice(index, 1);
      localStorage.setItem("students", JSON.stringify(students));
      renderTable(students);
    }
  }

  document.getElementById("searchInput").addEventListener("input", function () {
    const query = this.value.toLowerCase();
    const filtered = students.filter(s =>
      s.name.toLowerCase().includes(query) ||
      s.course.toLowerCase().includes(query)
    );
    renderTable(filtered);
  });

  renderTable(students);
</script>
</body>
</html>
